<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dépôts Bancaires</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f2f5; color: #2d3748; min-height: 100vh; }
    nav { background: #1a202c; color: white; padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,0.3); }
    .nav-title { font-size: 1.1rem; font-weight: 700; }
    .nav-link { color: #90cdf4; text-decoration: none; font-size: 0.9rem; font-weight: 500; }
    .nav-link:hover { color: white; }
    .container { max-width: 1100px; margin: 0 auto; padding: 24px 16px 48px; }
    h1 { font-size: 1.6rem; font-weight: 700; margin-bottom: 6px; }
    .subtitle { color: #718096; margin-bottom: 28px; font-size: 0.95rem; }
    .alert { padding: 12px 18px; border-radius: 8px; margin-bottom: 20px; font-weight: 500; display: none; }
    .alert.show { display: block; }
    .alert-success { background: #c6f6d5; color: #22543d; border: 1px solid #9ae6b4; }
    .alert-error { background: #fed7d7; color: #c53030; border: 1px solid #feb2b2; }
    .cards-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px; }
    .card { background: white; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); overflow: hidden; transition: box-shadow 0.2s; }
    .card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.12); }
    .card-header { padding: 18px 20px 14px; display: flex; align-items: center; gap: 10px; }
    .card-icon { font-size: 1.6rem; }
    .card-header h2 { font-size: 1.1rem; font-weight: 700; }
    .card-commerce .card-header { background: #ebf8ff; color: #2b6cb0; border-bottom: 3px solid #3182ce; }
    .card-tabac    .card-header { background: #fff5f5; color: #c53030; border-bottom: 3px solid #e53e3e; }
    .card-pmu      .card-header { background: #f0fff4; color: #276749; border-bottom: 3px solid #38a169; }
    .card-retrait  .card-header { background: #fffaf0; color: #7b341e; border-bottom: 3px solid #dd6b20; }
    .card-form { padding: 18px 20px 20px; display: flex; flex-direction: column; gap: 14px; }
    .form-group { display: flex; flex-direction: column; gap: 5px; }
    .form-group label { font-size: 0.78rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: #718096; }
    input[type=number], input[type=date], input[type=text] { border: 1.5px solid #e2e8f0; border-radius: 7px; padding: 9px 12px; font-size: 1rem; width: 100%; transition: border-color 0.2s; }
    input[type=number] { font-size: 1.3rem; font-weight: 700; }
    input:focus { outline: none; border-color: #4299e1; box-shadow: 0 0 0 3px rgba(66,153,225,0.15); }
    .btn { padding: 10px 16px; border: none; border-radius: 7px; font-size: 0.9rem; font-weight: 600; cursor: pointer; transition: opacity 0.15s; width: 100%; }
    .btn:hover { opacity: 0.88; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-commerce { background: #3182ce; color: white; }
    .btn-tabac    { background: #e53e3e; color: white; }
    .btn-pmu      { background: #38a169; color: white; }
    .btn-retrait  { background: #dd6b20; color: white; }
    @media (max-width: 600px) { .cards-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <nav>
    <span class="nav-title">💰 Gestion des Dépôts</span>
    <a href="verify.html" class="nav-link">Vérification →</a>
  </nav>

  <div class="container">
    <h1>Enregistrer une opération</h1>
    <p class="subtitle">Sélectionnez le type d'opération et saisissez le montant</p>

    <div id="alert" class="alert"></div>

    <div class="cards-grid">

      <!-- Commerce -->
      <div class="card card-commerce">
        <div class="card-header"><span class="card-icon">🛒</span><h2>Dépôt Commerce</h2></div>
        <div class="card-form">
          <div class="form-group"><label>Montant (€)</label><input type="number" id="amt-commerce" step="0.01" min="0.01" placeholder="0,00" inputmode="decimal"></div>
          <div class="form-group"><label>Date</label><input type="date" id="date-commerce"></div>
          <div class="form-group"><label>N° de bordereau</label><input type="text" id="note-commerce" placeholder="ex: 000123"></div>
          <button class="btn btn-commerce" onclick="save('depot','commerce')">Enregistrer le dépôt</button>
        </div>
      </div>

      <!-- Tabac -->
      <div class="card card-tabac">
        <div class="card-header"><span class="card-icon">🚬</span><h2>Dépôt Tabac</h2></div>
        <div class="card-form">
          <div class="form-group"><label>Montant (€)</label><input type="number" id="amt-tabac" step="0.01" min="0.01" placeholder="0,00" inputmode="decimal"></div>
          <div class="form-group"><label>Date</label><input type="date" id="date-tabac"></div>
          <div class="form-group"><label>N° de bordereau</label><input type="text" id="note-tabac" placeholder="ex: 000123"></div>
          <button class="btn btn-tabac" onclick="save('depot','tabac')">Enregistrer le dépôt</button>
        </div>
      </div>

      <!-- PMU -->
      <div class="card card-pmu">
        <div class="card-header"><span class="card-icon">🐴</span><h2>Dépôt PMU</h2></div>
        <div class="card-form">
          <div class="form-group"><label>Montant (€)</label><input type="number" id="amt-pmu" step="0.01" min="0.01" placeholder="0,00" inputmode="decimal"></div>
          <div class="form-group"><label>Date</label><input type="date" id="date-pmu"></div>
          <div class="form-group"><label>N° de bordereau</label><input type="text" id="note-pmu" placeholder="ex: 000123"></div>
          <button class="btn btn-pmu" onclick="save('depot','pmu')">Enregistrer le dépôt</button>
        </div>
      </div>

      <!-- Retrait -->
      <div class="card card-retrait">
        <div class="card-header"><span class="card-icon">💵</span><h2>Retrait (Monnaie)</h2></div>
        <div class="card-form">
          <div class="form-group"><label>Montant (€)</label><input type="number" id="amt-retrait" step="0.01" min="0.01" placeholder="0,00" inputmode="decimal"></div>
          <div class="form-group"><label>Date</label><input type="date" id="date-retrait"></div>
          <div class="form-group"><label>Motif (optionnel)</label><input type="text" id="note-retrait" placeholder="ex: monnaie caisse"></div>
          <button class="btn btn-retrait" onclick="save('retrait',null)">Enregistrer le retrait</button>
        </div>
      </div>

    </div>
  </div>

  <script>
    const GIST_TOKEN = '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';
    const GIST_ID    = 'b6d25e8ac17ba20189379f93c4c89cad';
    const API_URL    = `https://api.github.com/gists/${GIST_ID}`;

    // Init dates à aujourd'hui
    const today = new Date().toISOString().slice(0,10);
    ['commerce','tabac','pmu','retrait'].forEach(k => {
      document.getElementById('date-' + k).value = today;
    });

    function showAlert(msg, type) {
      const el = document.getElementById('alert');
      el.textContent = msg;
      el.className = 'alert show alert-' + type;
      setTimeout(() => el.className = 'alert', 3000);
    }

    async function loadData() {
      const r = await fetch(API_URL, { headers: { 'Authorization': 'token ' + GIST_TOKEN } });
      const g = await r.json();
      return JSON.parse(g.files['banque_data.json'].content);
    }

    async function saveData(data) {
      await fetch(API_URL, {
        method: 'PATCH',
        headers: { 'Authorization': 'token ' + GIST_TOKEN, 'Content-Type': 'application/json' },
        body: JSON.stringify({ files: { 'banque_data.json': { content: JSON.stringify(data) } } })
      });
    }

    async function save(type, account) {
      const key = account || 'retrait';
      const amtEl  = document.getElementById('amt-' + key);
      const dateEl = document.getElementById('date-' + key);
      const noteEl = document.getElementById('note-' + key);

      const amount = parseFloat(amtEl.value);
      if (!amount || amount <= 0) { showAlert('Veuillez saisir un montant valide.', 'error'); return; }

      const btn = event.target;
      btn.disabled = true;
      btn.textContent = 'Enregistrement…';

      try {
        const data = await loadData();
        data.transactions.push({
          id: Date.now().toString(),
          type,
          account,
          amount,
          date: dateEl.value || today,
          note: noteEl.value.trim(),
          verified: false,
          verified_at: null
        });
        await saveData(data);

        const label = account === 'commerce' ? 'Commerce' : account === 'tabac' ? 'Tabac' : account === 'pmu' ? 'PMU' : null;
        showAlert(label ? `✅ Dépôt enregistré — ${label}` : '✅ Retrait enregistré', 'success');
        amtEl.value = '';
        noteEl.value = '';
        dateEl.value = today;
      } catch(e) {
        showAlert('❌ Erreur de sauvegarde. Réessayez.', 'error');
      }

      btn.disabled = false;
      btn.textContent = type === 'depot' ? 'Enregistrer le dépôt' : 'Enregistrer le retrait';
    }
  </script>
</body>
</html>
