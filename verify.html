<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vérification — Relevé Bancaire</title>
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Dépôts">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f2f5; color: #2d3748; min-height: 100vh; }
    nav { background: #1a202c; color: white; padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,0.3); }
    .nav-title { font-size: 1.1rem; font-weight: 700; }
    .nav-link { color: #90cdf4; text-decoration: none; font-size: 0.9rem; font-weight: 500; }
    .container { max-width: 1100px; margin: 0 auto; padding: 24px 16px 48px; }
    .alerts-card { background: white; border-radius: 10px; padding: 16px 20px; margin-bottom: 20px; box-shadow: 0 2px 6px rgba(0,0,0,0.06); }
    .alerts-card-title { font-size: 0.78rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: #718096; margin-bottom: 12px; }
    .alerts-grid { display: flex; flex-direction: column; gap: 8px; }
    .alert { padding: 10px 14px; border-radius: 8px; font-weight: 500; display: flex; align-items: center; gap: 10px; }
    .alert-facture     { background: #fff5f5; color: #c53030; border: 1px solid #feb2b2; }
    .alert-prelevement { background: #fffaf0; color: #c05621; border: 1px solid #fbd38d; }
    .alert-verif       { background: #fefcbf; color: #744210; border: 1px solid #f6e05e; }
    .alert-ok          { background: #f0fff4; color: #276749; border: 1px solid #9ae6b4; }
    .alert .alert-count { font-size: 1.2rem; min-width: 24px; text-align: center; }
    .alert .alert-text  { display: flex; flex-direction: column; }
    .alert .alert-label { font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.4px; opacity: 0.7; }
    .alert .alert-msg   { font-size: 0.88rem; }

    /* Totaux */
    .totals-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px; }
    .total-card { background: white; border-radius: 10px; padding: 18px 20px; box-shadow: 0 2px 6px rgba(0,0,0,0.07); text-align: center; border-top: 4px solid transparent; }
    .total-commerce { border-top-color: #3182ce; } .total-tabac { border-top-color: #e53e3e; }
    .total-pmu { border-top-color: #38a169; } .total-retrait { border-top-color: #dd6b20; }
    .total-label { font-size: 0.9rem; font-weight: 700; color: #4a5568; margin-bottom: 6px; }
    .total-amount { font-size: 1.6rem; font-weight: 800; color: #1a202c; }
    .total-sublabel { font-size: 0.75rem; color: #a0aec0; margin-top: 4px; }
    .total-ecart { font-size: 0.78rem; font-weight: 700; color: #b45309; margin-top: 6px; }

    /* Filtres */
    .filters-card { background: white; border-radius: 10px; padding: 16px 20px; margin-bottom: 20px; box-shadow: 0 2px 6px rgba(0,0,0,0.06); }
    .filters-form { display: flex; flex-wrap: wrap; gap: 14px; align-items: flex-end; }
    .filter-group { display: flex; flex-direction: column; gap: 5px; }
    .filter-group label { font-size: 0.75rem; font-weight: 600; text-transform: uppercase; color: #718096; }
    select, input[type=date] { border: 1.5px solid #e2e8f0; border-radius: 7px; padding: 7px 10px; font-size: 0.9rem; min-width: 140px; width: 100%; }
    .btn { padding: 8px 16px; border: none; border-radius: 7px; font-size: 0.85rem; font-weight: 600; cursor: pointer; }
    .btn:hover { opacity: 0.88; }
    .btn-filter { background: #4299e1; color: white; }
    .btn-reset  { background: #e2e8f0; color: #4a5568; text-decoration: none; display: inline-block; }
    .btn-verify   { background: #fff5f5; border: 2px solid #c53030; color: #c53030; font-weight: 700; font-size: 0.82rem; padding: 5px 11px; border-radius: 6px; }
    .btn-verify:hover { background: #fed7d7; }
    .btn-unverify { background: #f0fff4; border: 2px solid #276749; color: #276749; font-weight: 700; font-size: 0.82rem; padding: 5px 11px; border-radius: 6px; }
    .btn-unverify:hover { background: #c6f6d5; }
    .btn-ecart    { background: #fffaf0; border: 2px solid #b45309; color: #b45309; font-weight: 700; font-size: 0.82rem; padding: 5px 11px; border-radius: 6px; }
    .btn-ecart:hover { background: #feebc8; }
    .btn-repending { background: #f7fafc; border: 2px solid #718096; color: #4a5568; font-weight: 700; font-size: 0.82rem; padding: 5px 11px; border-radius: 6px; }
    .btn-repending:hover { background: #edf2f7; }
    .btn-delete   { background: #fed7d7; color: #c53030; padding: 5px 9px; font-size: 0.8rem; }
    .btn-subtype  { background: #e9f5ff; border: 2px solid #63b3ed; color: #2b6cb0; font-weight: 700; font-size: 0.82rem; padding: 5px 11px; border-radius: 6px; }
    .btn-subtype:hover { background: #bee3f8; }
    .btn-edit     { background: #faf5ff; border: 2px solid #805ad5; color: #553c9a; font-weight: 700; font-size: 0.82rem; padding: 5px 11px; border-radius: 6px; }
    .btn-edit:hover { background: #e9d8fd; }

    /* Modale Édition */
    .edit-modal { background: white; border-radius: 14px; padding: 28px 24px; max-width: 380px; width: 92%; box-shadow: 0 8px 32px rgba(0,0,0,0.2); }
    .edit-modal h3 { font-size: 1.05rem; margin-bottom: 18px; color: #2d3748; }
    .edit-modal .edit-field { display: flex; flex-direction: column; gap: 5px; margin-bottom: 14px; }
    .edit-modal label { font-size: 0.75rem; font-weight: 700; text-transform: uppercase; color: #718096; }
    .edit-modal input { border: 1.5px solid #e2e8f0; border-radius: 7px; padding: 9px 12px; font-size: 1rem; width: 100%; }
    .edit-modal input[type=number] { font-size: 1.4rem; font-weight: 700; }
    .edit-modal input:focus { outline: none; border-color: #805ad5; box-shadow: 0 0 0 3px rgba(128,90,213,0.15); }
    .edit-modal-btns { display: flex; gap: 10px; margin-top: 18px; }
    .edit-modal-btns .btn { flex: 1; padding: 11px; font-size: 0.9rem; }
    .btn-confirm-edit { background: #805ad5; color: white; }
    .btn-cancel-edit  { background: #e2e8f0; color: #4a5568; }
    .toggle-group { display: grid; grid-template-columns: 1fr 1fr; border-radius: 8px; overflow: hidden; border: 2px solid #805ad5; }
    .toggle-btn { padding: 10px 8px; border: none; cursor: pointer; font-size: 0.88rem; font-weight: 700; background: white; transition: background 0.15s, color 0.15s; }
    .toggle-btn.active { background: #805ad5; color: white; }

    /* Toggle vue tableau / visuelle */
    .view-switcher { display: flex; gap: 8px; margin-bottom: 14px; }
    .view-btn { padding: 8px 16px; border-radius: 8px; border: 2px solid #e2e8f0; background: white; color: #718096; font-weight: 700; font-size: 0.85rem; cursor: pointer; transition: all 0.15s; }
    .view-btn.active { background: #1a202c; color: white; border-color: #1a202c; }

    /* Vue visuelle */
    .overview-wrapper { display: flex; flex-direction: column; gap: 5px; }
    .ov-month { font-size: 0.72rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.8px; color: #a0aec0; margin-top: 14px; margin-bottom: 4px; padding-left: 4px; }
    .ov-row { display: flex; align-items: center; gap: 12px; padding: 9px 14px; border-radius: 8px; border-left: 5px solid transparent; cursor: default; }
    .ov-row.ov-verified { background: #f0fff4; border-left-color: #38a169; }
    .ov-row.ov-pending  { background: #f7fafc; border-left-color: #a0aec0; }
    .ov-row.ov-ecart    { background: #fffaf0; border-left-color: #dd6b20; }
    .ov-date    { font-size: 0.82rem; color: #718096; min-width: 72px; font-weight: 600; }
    .ov-account { font-size: 0.78rem; font-weight: 700; padding: 2px 8px; border-radius: 10px; white-space: nowrap; }
    .ov-acc-commerce { background: #ebf8ff; color: #2b6cb0; }
    .ov-acc-tabac    { background: #fff5f5; color: #c53030; }
    .ov-acc-pmu      { background: #f0fff4; color: #276749; }
    .ov-acc-retrait  { background: #fffaf0; color: #c05621; }
    .ov-amount  { font-size: 0.95rem; font-weight: 800; margin-left: auto; white-space: nowrap; }
    .ov-amount.depot   { color: #276749; }
    .ov-amount.retrait { color: #c53030; }
    .ov-status  { font-size: 0.72rem; font-weight: 700; padding: 2px 8px; border-radius: 10px; white-space: nowrap; }
    .ov-status.ov-verified { background: #c6f6d5; color: #276749; }
    .ov-status.ov-pending  { background: #e2e8f0; color: #718096; }
    .ov-status.ov-ecart    { background: #feebc8; color: #c05621; }
    .ov-ecart-detail { font-size: 0.72rem; color: #b45309; margin-left: 4px; }

    /* Modale Écart */
    .ecart-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.55); z-index: 200; display: flex; align-items: center; justify-content: center; }
    .ecart-modal { background: white; border-radius: 14px; padding: 28px 24px; max-width: 360px; width: 92%; box-shadow: 0 8px 32px rgba(0,0,0,0.2); }
    .ecart-modal h3 { font-size: 1.05rem; margin-bottom: 6px; color: #2d3748; }
    .ecart-modal .ecart-info { font-size: 0.88rem; color: #718096; margin-bottom: 18px; }
    .ecart-modal .ecart-info strong { color: #2d3748; }
    .ecart-modal label { font-size: 0.75rem; font-weight: 700; text-transform: uppercase; color: #718096; display: block; margin-bottom: 5px; }
    .ecart-modal input { border: 1.5px solid #e2e8f0; border-radius: 7px; padding: 9px 12px; font-size: 1.4rem; font-weight: 700; width: 100%; margin-bottom: 8px; }
    .ecart-modal input:focus { outline: none; border-color: #d97706; box-shadow: 0 0 0 3px rgba(217,119,6,0.15); }
    .ecart-diff { font-size: 0.9rem; font-weight: 700; padding: 8px 12px; border-radius: 7px; margin-bottom: 18px; text-align: center; min-height: 36px; }
    .ecart-diff.neg { background: #fff5f5; color: #c53030; }
    .ecart-diff.pos { background: #f0fff4; color: #276749; }
    .ecart-diff.zero { background: #f0fff4; color: #276749; }
    .ecart-modal-btns { display: flex; gap: 10px; }
    .ecart-modal-btns .btn { flex: 1; padding: 11px; font-size: 0.9rem; }
    .btn-confirm-ecart { background: #d97706; color: white; }
    .btn-cancel-ecart  { background: #e2e8f0; color: #4a5568; }
    .ecart-detail { font-size: 0.72rem; color: #b45309; margin-top: 2px; }

    /* Tableau */
    .table-wrapper { background: white; border-radius: 10px; box-shadow: 0 2px 6px rgba(0,0,0,0.07); overflow: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    thead { background: #f7fafc; }
    th { padding: 12px 14px; text-align: left; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: #718096; border-bottom: 2px solid #e2e8f0; white-space: nowrap; }
    td { padding: 11px 14px; border-bottom: 1px solid #f0f4f8; vertical-align: middle; }
    .row-verified { background: #f0fff4; } .row-pending { background: white; } .row-ecart { background: #fffbeb; }
    .row-verified:hover { background: #e6ffed; } .row-pending:hover { background: #f7fafc; } .row-ecart:hover { background: #fef3c7; }
    .badge { padding: 3px 9px; border-radius: 20px; font-size: 0.78rem; font-weight: 700; }
    .badge-depot   { background: #bee3f8; color: #2b6cb0; }
    .badge-retrait { background: #fed7d7; color: #c53030; }
    .amount-depot   { color: #276749; font-weight: 700; }
    .amount-retrait { color: #c53030; font-weight: 700; }
    .status-verified { color: #276749; font-weight: 600; font-size: 0.85rem; }
    .status-pending  { color: #b7791f; font-weight: 600; font-size: 0.85rem; }
    .status-ecart    { color: #b45309; font-weight: 600; font-size: 0.85rem; }
    .verified-date { font-size: 0.72rem; color: #a0aec0; }
    .td-actions { white-space: nowrap; display: flex; gap: 5px; align-items: center; }
    .empty-state { text-align: center; padding: 48px; color: #a0aec0; }
    #loading { text-align: center; padding: 40px; color: #718096; }
    @media (max-width: 600px) {
      body { overflow-x: hidden; }
      .container { padding-left: 8px; padding-right: 8px; max-width: 100vw; }
      .totals-grid { grid-template-columns: 1fr 1fr; }
      .total-card { padding: 12px 10px; }
      .total-amount { font-size: 1.2rem; }
      .filters-form { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
      .filters-form .btn { width: 100%; }
      select, input[type=date] { min-width: 0; width: 100%; box-sizing: border-box; }
      .filter-group { min-width: 0; }
      input[type=date] { background: white; border: 1.5px solid #cbd5e0; border-radius: 7px; display: block; }
      .view-switcher { width: 100%; }
      .view-btn { flex: 1; font-size: 0.8rem; padding: 8px 6px; }

      /* Tableau → cartes 2 colonnes */
      .table-wrapper { background: transparent; box-shadow: none; border-radius: 0; overflow: visible; }
      table, thead, tbody, th { display: block; }
      thead tr { position: absolute; top: -9999px; left: -9999px; }
      tbody tr {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 6px 10px;
        background: white; border-radius: 10px; margin-bottom: 10px;
        padding: 12px 14px; box-shadow: 0 2px 6px rgba(0,0,0,0.08);
        border-left: 4px solid #e2e8f0;
      }
      tr.row-verified { background: #f0fff4; border-left-color: #38a169; }
      tr.row-pending  { border-left-color: #e2e8f0; }
      tr.row-ecart    { background: #fffbeb; border-left-color: #d97706; }
      td { padding: 2px 0; border: none; font-size: 0.88rem; min-width: 0; overflow: hidden; }
      td[data-label]::before {
        content: attr(data-label);
        display: block;
        font-size: 0.65rem; font-weight: 700; text-transform: uppercase;
        color: #a0aec0; letter-spacing: 0.4px; margin-bottom: 1px;
      }
      td[data-label="Date"]      { grid-column: 1; grid-row: 1; }
      td[data-label="Compte"]    { grid-column: 2; grid-row: 1; }
      td[data-label="Type"]      { grid-column: 1; grid-row: 2; }
      td[data-label="Bordereau"] { grid-column: 2; grid-row: 2; display: block; }
      td[data-label="Montant"]   { grid-column: 1; grid-row: 3; }
      td[data-label="Statut"]    { grid-column: 2; grid-row: 3; }
      td.td-actions {
        grid-column: 1 / -1; grid-row: 4; padding-top: 8px;
        display: flex; flex-wrap: wrap; gap: 6px;
      }
      .btn { font-size: 0.78rem; padding: 5px 8px; }
      .col-bordereau { display: block; }
      .td-amount { font-size: 1.05rem; }

      /* Vue d'ensemble mobile : une seule ligne alignée */
      .ov-row         { display: flex; align-items: center; flex-wrap: nowrap; gap: 5px; padding: 8px 10px; }
      .ov-date        { font-size: 0.72rem; min-width: 42px; flex-shrink: 0; order: 0; }
      .ov-account     { font-size: 0.7rem; padding: 1px 5px; flex: 1 1 0; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; order: 1; }
      .ov-ecart-detail { display: block; order: 2; font-size: 0.72rem; flex-shrink: 0; white-space: nowrap; }
      .ov-amount      { font-size: 0.82rem; margin-left: 0; flex-shrink: 0; white-space: nowrap; order: 3; }
      .ov-status      { font-size: 0.68rem; padding: 2px 5px; flex-shrink: 0; white-space: nowrap; order: 4; }
    }
  </style>
</head>
<body>
  <nav>
    <span class="nav-title">🔍 Vérification des Dépôts</span>
    <a href="index.html" class="nav-link">← Retour aux dépôts</a>
  </nav>

  <div class="container">
    <div class="totals-grid">
      <div class="total-card total-commerce"><div class="total-label">🛒 Commerce</div><div class="total-amount" id="tot-commerce">—</div><div class="total-sublabel">non vérifié</div><div class="total-ecart" id="ecart-commerce" style="display:none"></div></div>
      <div class="total-card total-tabac"><div class="total-label">🚬 Tabac</div><div class="total-amount" id="tot-tabac">—</div><div class="total-sublabel">non vérifié</div><div class="total-ecart" id="ecart-tabac" style="display:none"></div></div>
      <div class="total-card total-pmu"><div class="total-label">🐴 PMU</div><div class="total-amount" id="tot-pmu">—</div><div class="total-sublabel">non vérifié</div><div class="total-ecart" id="ecart-pmu" style="display:none"></div></div>
      <div class="total-card total-retrait"><div class="total-label">💵 Retraits</div><div class="total-amount" id="tot-retrait">—</div><div class="total-sublabel">non vérifié</div><div class="total-ecart" id="ecart-retrait" style="display:none"></div></div>
    </div>

    <div class="alerts-card">
      <div class="alerts-card-title">⚠️ Alertes</div>
      <div class="alerts-grid">
        <div id="alert-facture"     class="alert" style="display:none"></div>
        <div id="alert-prelevement" class="alert" style="display:none"></div>
        <div id="alert-verif"       class="alert" style="display:none"></div>
        <div id="alert-ecart"       class="alert" style="display:none"></div>
      </div>
    </div>

    <div class="filters-card">
      <div class="filters-form">
        <div class="filter-group">
          <label>Compte</label>
          <select id="f-account">
            <option value="">Tous</option>
            <option value="commerce">🛒 Commerce</option>
            <option value="tabac">🚬 Tabac</option>
            <option value="pmu">🐴 PMU</option>
            <option value="retrait">💵 Retraits</option>
          </select>
        </div>
        <div class="filter-group">
          <label>Statut</label>
          <select id="f-status">
            <option value="">Tous</option>
            <option value="pending">En attente</option>
            <option value="verified">Vérifié</option>
            <option value="ecart">Écart</option>
          </select>
        </div>
        <div class="filter-group"><label>Du</label><input type="date" id="f-from"></div>
        <div class="filter-group"><label>Au</label><input type="date" id="f-to"></div>
        <button class="btn btn-filter" onclick="render()">Filtrer</button>
        <button class="btn btn-reset" onclick="resetFilters()">Réinitialiser</button>
      </div>
    </div>

    <div class="view-switcher">
      <button class="view-btn active" id="btn-vue-tableau" onclick="switchView('tableau')">☰ Tableau</button>
      <button class="view-btn" id="btn-vue-visuelle" onclick="switchView('visuelle')">◉ Vue d'ensemble</button>
    </div>

    <div id="loading">Chargement…</div>
    <div class="table-wrapper" id="table-wrapper" style="display:none">
      <table>
        <thead><tr><th>Date</th><th>Type</th><th>Compte</th><th>Montant</th><th class="col-bordereau">Bordereau</th><th>Statut</th><th>Actions</th></tr></thead>
        <tbody id="tbody"></tbody>
      </table>
      <div id="empty-state" class="empty-state" style="display:none">Aucune opération trouvée.</div>
    </div>

    <div class="overview-wrapper" id="overview-wrapper" style="display:none"></div>
  </div>

  <script>
    const GIST_ID = 'b6d25e8ac17ba20189379f93c4c89cad';
    const _a = ['gh','p_VoUD9to','lbKfu8xfY','QFfzMBWV5','8HO9h32XekT'];

    function getToken() { return localStorage.getItem('banque_token') || _a.join(''); }
    function apiUrl() { return `https://api.github.com/gists/${GIST_ID}`; }

    window.addEventListener('DOMContentLoaded', () => {
      loadData().then(data => { allData = data; document.getElementById('loading').style.display='none'; render(); }).catch(() => showConfig());
    });

    function showConfig() {
      const div = document.createElement('div');
      div.id = 'config-overlay';
      div.style = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);z-index:999;display:flex;align-items:center;justify-content:center';
      div.innerHTML = `<div style="background:white;border-radius:12px;padding:32px;max-width:400px;width:90%;text-align:center">
        <h2 style="margin-bottom:12px">⚙️ Configuration</h2>
        <p style="color:#718096;margin-bottom:20px;font-size:0.9rem">Saisissez le token GitHub une seule fois</p>
        <input id="token-input" type="password" placeholder="ghp_..." style="width:100%;border:1.5px solid #e2e8f0;border-radius:7px;padding:10px;font-size:0.9rem;margin-bottom:16px">
        <button onclick="saveToken()" style="width:100%;background:#3182ce;color:white;border:none;border-radius:7px;padding:11px;font-size:1rem;font-weight:700;cursor:pointer">Enregistrer</button>
      </div>`;
      document.body.appendChild(div);
    }

    function saveToken() {
      const t = document.getElementById('token-input').value.trim();
      if (!t) return;
      localStorage.setItem('banque_token', t);
      document.getElementById('config-overlay').remove();
      loadData().then(data => { allData = data; document.getElementById('loading').style.display='none'; render(); });
    }

    let allData = { transactions: [] };
    let currentView = 'tableau';

    function switchView(v) {
      currentView = v;
      document.getElementById('btn-vue-tableau').classList.toggle('active', v === 'tableau');
      document.getElementById('btn-vue-visuelle').classList.toggle('active', v === 'visuelle');
      render();
    }

    async function loadData() {
      const r = await fetch(apiUrl(), { headers: { 'Authorization': 'token ' + getToken() } });
      const g = await r.json();
      const content = g.files['banque_data.json'].content;
      if (!content || !content.trim()) {
        const empty = { transactions: [] };
        await saveData(empty);
        return empty;
      }
      try { return JSON.parse(content); }
      catch(e) { return { transactions: [] }; }
    }

    async function saveData(data) {
      await fetch(apiUrl(), {
        method: 'PATCH',
        headers: { 'Authorization': 'token ' + getToken(), 'Content-Type': 'application/json' },
        body: JSON.stringify({ files: { 'banque_data.json': { content: JSON.stringify(data) } } })
      });
    }

    function fmt(n) { return n.toFixed(2) + '€'; }
    function fmtDate(d) { if (!d) return ''; const [y,m,j] = d.split('-'); return `${j}-${m}-${y.slice(2)}`; }

    function isCommerce(tx) {
      return tx.account === 'commerce' || tx.account == null || tx.account === 'retrait';
    }

    function accountLabel(tx) {
      if (tx.account === 'tabac') return '🚬 Tabac';
      if (tx.account === 'pmu')   return '🐴 PMU';
      // Commerce (dépôts + retraits)
      if (tx.type === 'retrait' || isCommerce(tx)) {
        if (tx.type === 'depot' && tx.subtype) {
          const sub = tx.subtype === 'monnaie'
            ? '<span style="font-size:0.72rem;background:#fefcbf;color:#744210;border:1px solid #f6e05e;border-radius:10px;padding:1px 6px;margin-left:4px;font-weight:700">🪙 Monnaie</span>'
            : '<span style="font-size:0.72rem;background:#e9f5ff;color:#2b6cb0;border:1px solid #bee3f8;border-radius:10px;padding:1px 6px;margin-left:4px;font-weight:700">💵 Espèces</span>';
          return '🛒 Commerce' + sub;
        }
        return '🛒 Commerce';
      }
      return '—';
    }

    function getStatus(tx) {
      if (tx.status) return tx.status;
      return tx.verified ? 'verified' : 'pending';
    }

    function render() {
      const fAccount = document.getElementById('f-account').value;
      const fStatus  = document.getElementById('f-status').value;
      const fFrom    = document.getElementById('f-from').value;
      const fTo      = document.getElementById('f-to').value;

      let txs = allData.transactions.slice();

      // Filtres
      if (fAccount === 'retrait')   txs = txs.filter(t => t.type === 'retrait');
      else if (fAccount === 'commerce') txs = txs.filter(t => isCommerce(t));
      else if (fAccount)            txs = txs.filter(t => t.account === fAccount);
      if (fStatus === 'pending')  txs = txs.filter(t => getStatus(t) === 'pending');
      if (fStatus === 'verified') txs = txs.filter(t => getStatus(t) === 'verified');
      if (fStatus === 'ecart')    txs = txs.filter(t => getStatus(t) === 'ecart');
      if (fFrom) txs = txs.filter(t => t.date >= fFrom);
      if (fTo)   txs = txs.filter(t => t.date <= fTo);

      // Trier par date desc
      txs.sort((a,b) => b.date.localeCompare(a.date) || b.id.localeCompare(a.id));

      // Totaux filtrés (sans filtre compte)
      let base = allData.transactions.slice();
      if (fStatus === 'pending')  base = base.filter(t => getStatus(t) === 'pending');
      if (fStatus === 'verified') base = base.filter(t => getStatus(t) === 'verified');
      if (fStatus === 'ecart')    base = base.filter(t => getStatus(t) === 'ecart');
      if (fFrom) base = base.filter(t => t.date >= fFrom);
      if (fTo)   base = base.filter(t => t.date <= fTo);

      // Totaux non-vérifiés + écarts cumulés par compte (toujours sur toutes les données, sans filtre)
      const all = allData.transactions;
      ['commerce','tabac','pmu'].forEach(acc => {
        const pending = all.filter(t => t.type === 'depot' && t.account === acc && getStatus(t) === 'pending').reduce((s,t) => s + t.amount, 0);
        document.getElementById('tot-' + acc).textContent = fmt(pending);
        const ecartSum = all.filter(t => t.type === 'depot' && t.account === acc && getStatus(t) === 'ecart' && t.ecart_amount != null).reduce((s,t) => s + t.ecart_amount, 0);
        const ecartEl = document.getElementById('ecart-' + acc);
        const ecartCount = all.filter(t => t.type === 'depot' && t.account === acc && getStatus(t) === 'ecart').length;
        if (ecartCount > 0) {
          ecartEl.textContent = `⚠️ écart cumulé : ${ecartSum > 0 ? '+' : ''}${fmt(ecartSum)} (${ecartCount})`;
          ecartEl.style.display = 'block';
        } else {
          ecartEl.style.display = 'none';
        }
      });
      const pendingR = all.filter(t => t.type === 'retrait' && getStatus(t) === 'pending').reduce((s,t) => s + t.amount, 0);
      document.getElementById('tot-retrait').textContent = fmt(pendingR);
      const ecartR = all.filter(t => t.type === 'retrait' && getStatus(t) === 'ecart' && t.ecart_amount != null).reduce((s,t) => s + t.ecart_amount, 0);
      const ecartRCount = all.filter(t => t.type === 'retrait' && getStatus(t) === 'ecart').length;
      const ecartRetEl = document.getElementById('ecart-retrait');
      if (ecartRCount > 0) {
        ecartRetEl.textContent = `⚠️ écart cumulé : ${ecartR > 0 ? '+' : ''}${fmt(ecartR)} (${ecartRCount})`;
        ecartRetEl.style.display = 'block';
      } else {
        ecartRetEl.style.display = 'none';
      }

      // Alertes
      const pendingFacture     = allData.transactions.filter(t => t.type === 'depot'   && getStatus(t) === 'pending').length;
      const pendingPrelevement = allData.transactions.filter(t => t.type === 'retrait' && getStatus(t) === 'pending').length;
      const pendingVerif       = pendingFacture + pendingPrelevement;
      const countEcart         = allData.transactions.filter(t => getStatus(t) === 'ecart').length;

      function setAlert(id, cssClass, iconOk, iconWarn, label, count, msgWarn, msgOk) {
        const el = document.getElementById(id);
        if (count > 0) {
          el.className = 'alert ' + cssClass;
          el.innerHTML = `<span class="alert-count">${iconWarn}</span><span class="alert-text"><span class="alert-label">${label}</span><span class="alert-msg">${count} ${msgWarn}</span></span>`;
        } else {
          el.className = 'alert alert-ok';
          el.innerHTML = `<span class="alert-count">${iconOk}</span><span class="alert-text"><span class="alert-label">${label}</span><span class="alert-msg">${msgOk}</span></span>`;
        }
        el.style.display = 'flex';
      }

      setAlert('alert-facture',     'alert-facture',     '✅', '📄', 'Réception de facture',
               pendingFacture,    'dépôt(s) non encore réceptionné(s)', 'Toutes les factures sont réceptionnées');
      setAlert('alert-prelevement', 'alert-prelevement', '✅', '💳', 'Prélèvement',
               pendingPrelevement, 'retrait(s) en attente de confirmation', 'Tous les prélèvements sont confirmés');
      setAlert('alert-verif',       'alert-verif',       '✅', '🔍', 'Vérification bancaire',
               pendingVerif,      'opération(s) à vérifier sur le relevé', 'Toutes les opérations sont vérifiées');
      setAlert('alert-ecart',       'alert-prelevement', '✅', '⚠️', 'Écarts à re-vérifier',
               countEcart,        'opération(s) avec écart détecté', 'Aucun écart détecté');

      // Choix de la vue
      const tableWrapper   = document.getElementById('table-wrapper');
      const overviewWrapper = document.getElementById('overview-wrapper');
      tableWrapper.style.display   = currentView === 'tableau'   ? 'block' : 'none';
      overviewWrapper.style.display = currentView === 'visuelle' ? 'flex'  : 'none';

      // Vue d'ensemble visuelle
      if (currentView === 'visuelle') {
        overviewWrapper.innerHTML = '';
        if (!txs.length) {
          overviewWrapper.innerHTML = '<div style="text-align:center;color:#a0aec0;padding:32px">Aucune opération trouvée.</div>';
        } else {
          const ovLabel = tx => {
            if (tx.account === 'tabac') return '🚬 Tabac';
            if (tx.account === 'pmu')   return '🐴 PMU';
            return tx.subtype === 'monnaie' ? '🛒 Commerce 🪙' : '🛒 Commerce';
          };
          const accClass = a => ({'tabac':'ov-acc-tabac','pmu':'ov-acc-pmu'}[a] || 'ov-acc-commerce');
          let lastMonth = '';
          txs.forEach(tx => {
            const s = getStatus(tx);
            const month = tx.date.slice(0, 7);
            if (month !== lastMonth) {
              lastMonth = month;
              const [y, m] = month.split('-');
              const label = new Date(y, m-1).toLocaleDateString('fr-FR', { month: 'long', year: 'numeric' });
              const sep = document.createElement('div');
              sep.className = 'ov-month';
              sep.textContent = label;
              overviewWrapper.appendChild(sep);
            }
            const row = document.createElement('div');
            row.className = `ov-row ov-${s}`;
            const ecartStr = s === 'ecart' && tx.ecart_amount != null
              ? `<span class="ov-ecart-detail">(${tx.ecart_amount > 0 ? '+' : ''}${fmt(tx.ecart_amount)})</span>` : '';
            const statusLabel = s === 'verified' ? '✅ Vérifié' : s === 'ecart' ? '⚠️ Écart' : '⏳ Attente';
            row.innerHTML = `
              <span class="ov-date">${fmtDate(tx.date)}</span>
              <span class="ov-account ${accClass(tx.account)}">${ovLabel(tx)}</span>
              <span class="ov-amount ${tx.type}">${tx.type === 'retrait' ? '💰 ' : '+'}${fmt(tx.amount)}</span>
              <span class="ov-status ov-${s}">${statusLabel}</span>
              ${ecartStr}`;
            overviewWrapper.appendChild(row);
          });
        }
      }

      // Tableau
      const tbody = document.getElementById('tbody');
      tbody.innerHTML = '';
      document.getElementById('empty-state').style.display = txs.length ? 'none' : 'block';

      txs.forEach(tx => {
        const s = getStatus(tx);
        const tr = document.createElement('tr');
        tr.className = s === 'verified' ? 'row-verified' : s === 'ecart' ? 'row-ecart' : 'row-pending';
        const amountStr = (tx.type === 'retrait' ? '-' : '') + fmt(tx.amount);

        let statusHtml;
        if (s === 'verified') {
          statusHtml = `<span class="status-verified">✅ Vérifié</span>${tx.verified_at ? `<div class="verified-date">${fmtDate(tx.verified_at.slice(0,10))}</div>` : ''}`;
        } else if (s === 'ecart') {
          const diff = tx.ecart_amount != null ? tx.ecart_amount : null;
          const diffStr = diff != null
            ? `<div class="ecart-detail">Relevé : ${fmt(tx.releve_amount)} &nbsp;|&nbsp; Diff : ${diff > 0 ? '+' : ''}${fmt(diff)}</div>`
            : '';
          statusHtml = `<span class="status-ecart">⚠️ Écart</span>${diffStr}`;
        } else {
          statusHtml = `<span class="status-pending">⏳ En attente</span>`;
        }

        let actionsHtml;
        if (s === 'pending') {
          actionsHtml = `<button class="btn btn-verify" onclick="setStatus('${tx.id}','verified')">✓ Vérifier</button>
                         <button class="btn btn-ecart" onclick="showEcartModal('${tx.id}')">⚠ Écart</button>`;
        } else if (s === 'verified') {
          actionsHtml = `<button class="btn btn-ecart" onclick="showEcartModal('${tx.id}')">⚠ Écart</button>
                         <button class="btn btn-repending" onclick="setStatus('${tx.id}','pending')">↩ Annuler</button>`;
        } else {
          actionsHtml = `<button class="btn btn-verify" onclick="setStatus('${tx.id}','verified')">✓ Vérifier</button>
                         <button class="btn btn-ecart" onclick="showEcartModal('${tx.id}')">✏️ Modifier</button>
                         <button class="btn btn-repending" onclick="setStatus('${tx.id}','pending')">↩ Attente</button>`;
        }
        actionsHtml += `<button class="btn btn-edit" onclick="showEditModal('${tx.id}')">✏️</button>`;

        tr.innerHTML = `
          <td data-label="Date" style="color:#4a5568;white-space:nowrap">${fmtDate(tx.date)}</td>
          <td data-label="Type"><span class="badge badge-${tx.type}">${tx.type === 'depot' ? 'Dépôt' : 'Retrait'}</span></td>
          <td data-label="Compte">${accountLabel(tx)}</td>
          <td data-label="Montant" class="amount-${tx.type} td-amount" style="white-space:nowrap">${amountStr}</td>
          <td data-label="Bordereau" class="col-bordereau" style="color:#718096;font-style:italic">${tx.note || '—'}</td>
          <td data-label="Statut">${statusHtml}</td>
          <td class="td-actions">
            ${actionsHtml}
            <button class="btn btn-delete" onclick="deleteTx('${tx.id}')">🗑</button>
          </td>`;
        tbody.appendChild(tr);
      });
    }

    function showEditModal(id) {
      const tx = allData.transactions.find(t => t.id === id);
      if (!tx) return;
      const subtypeField = tx.account === 'commerce' ? `
        <div class="edit-field">
          <label>Type de versement</label>
          <div class="toggle-group" style="border-color:#805ad5">
            <button id="edit-toggle-especes" class="toggle-btn${(tx.subtype !== 'monnaie') ? ' active' : ''}" style="color:#553c9a" onclick="editSetSubtype('especes')" type="button">💵 Espèces</button>
            <button id="edit-toggle-monnaie" class="toggle-btn${tx.subtype === 'monnaie' ? ' active' : ''}" style="color:#553c9a" onclick="editSetSubtype('monnaie')" type="button">🪙 Monnaie</button>
          </div>
        </div>` : '';
      const overlay = document.createElement('div');
      overlay.className = 'ecart-overlay';
      overlay.id = 'edit-overlay';
      overlay.innerHTML = `
        <div class="edit-modal">
          <h3>✏️ Modifier l'opération</h3>
          ${subtypeField}
          <div class="edit-field"><label>Montant (€)</label><input type="number" id="edit-amount" step="0.01" min="0.01" inputmode="decimal" value="${tx.amount}"></div>
          <div class="edit-field"><label>Date</label><input type="date" id="edit-date" value="${tx.date}"></div>
          <div class="edit-field"><label>N° de bordereau</label><input type="text" id="edit-note" inputmode="numeric" value="${tx.note || ''}"></div>
          <div class="edit-modal-btns">
            <button class="btn btn-confirm-edit" onclick="confirmEdit('${id}')">Enregistrer</button>
            <button class="btn btn-cancel-edit" onclick="document.getElementById('edit-overlay').remove()">Annuler</button>
          </div>
        </div>`;
      document.body.appendChild(overlay);
      document.getElementById('edit-amount').focus();
    }

    function editSetSubtype(type) {
      document.getElementById('edit-toggle-especes').classList.toggle('active', type === 'especes');
      document.getElementById('edit-toggle-monnaie').classList.toggle('active', type === 'monnaie');
    }

    async function confirmEdit(id) {
      const tx = allData.transactions.find(t => t.id === id);
      if (!tx) return;
      const amount = parseFloat(document.getElementById('edit-amount').value);
      const date   = document.getElementById('edit-date').value;
      const note   = document.getElementById('edit-note').value.trim();
      if (!amount || amount <= 0) return;
      tx.amount = amount;
      tx.date   = date;
      tx.note   = note;
      if (tx.account === 'commerce') {
        tx.subtype = document.getElementById('edit-toggle-monnaie').classList.contains('active') ? 'monnaie' : 'especes';
      }
      document.getElementById('edit-overlay').remove();
      await saveData(allData);
      render();
    }

    async function toggleSubtype(id, subtype) {
      const tx = allData.transactions.find(t => t.id === id);
      if (!tx) return;
      tx.subtype = subtype;
      await saveData(allData);
      render();
    }

    async function setStatus(id, status) {
      const tx = allData.transactions.find(t => t.id === id);
      if (!tx) return;
      tx.status = status;
      tx.verified = (status === 'verified');
      if (status === 'verified') tx.verified_at = new Date().toISOString();
      if (status === 'pending') { tx.releve_amount = null; tx.ecart_amount = null; }
      await saveData(allData);
      render();
    }

    function showEcartModal(id) {
      const tx = allData.transactions.find(t => t.id === id);
      if (!tx) return;
      const existing = tx.releve_amount != null ? tx.releve_amount : '';

      const overlay = document.createElement('div');
      overlay.className = 'ecart-overlay';
      overlay.id = 'ecart-overlay';
      overlay.innerHTML = `
        <div class="ecart-modal">
          <h3>⚠️ Saisir l'écart</h3>
          <div class="ecart-info">Montant déposé : <strong>${fmt(tx.amount)}</strong></div>
          <label>Montant sur le relevé (€)</label>
          <input type="number" id="releve-input" step="0.01" inputmode="decimal" placeholder="0,00" value="${existing}" oninput="updateDiffPreview(${tx.amount})">
          <div class="ecart-diff" id="ecart-diff-preview"></div>
          <div class="ecart-modal-btns">
            <button class="btn btn-confirm-ecart" onclick="confirmEcart('${id}', ${tx.amount})">Confirmer</button>
            <button class="btn btn-cancel-ecart" onclick="document.getElementById('ecart-overlay').remove()">Annuler</button>
          </div>
        </div>`;
      document.body.appendChild(overlay);

      const input = document.getElementById('releve-input');
      input.focus();
      if (existing !== '') updateDiffPreview(tx.amount);
    }

    function updateDiffPreview(depositAmount) {
      const val = parseFloat(document.getElementById('releve-input').value);
      const div = document.getElementById('ecart-diff-preview');
      if (isNaN(val)) { div.textContent = ''; div.className = 'ecart-diff'; return; }
      const diff = val - depositAmount;
      if (diff === 0) {
        div.className = 'ecart-diff zero';
        div.textContent = 'Aucun écart (montants identiques)';
      } else {
        div.className = 'ecart-diff ' + (diff < 0 ? 'neg' : 'pos');
        div.textContent = `Écart : ${diff > 0 ? '+' : ''}${fmt(diff)} (il manque ${fmt(Math.abs(diff))} sur le relevé)`;
      }
    }

    async function confirmEcart(id, depositAmount) {
      const releve = parseFloat(document.getElementById('releve-input').value);
      if (isNaN(releve) || releve < 0) return;
      const tx = allData.transactions.find(t => t.id === id);
      if (!tx) return;
      tx.status = 'ecart';
      tx.verified = false;
      tx.releve_amount = releve;
      tx.ecart_amount = releve - depositAmount;
      document.getElementById('ecart-overlay').remove();
      await saveData(allData);
      render();
    }

    async function deleteTx(id) {
      if (!confirm('Supprimer cette opération ?')) return;
      allData.transactions = allData.transactions.filter(t => t.id !== id);
      await saveData(allData);
      render();
    }

    function resetFilters() {
      document.getElementById('f-account').value = '';
      document.getElementById('f-status').value = '';
      document.getElementById('f-from').value = '';
      document.getElementById('f-to').value = '';
      render();
    }

    // Init
    loadData().then(data => {
      allData = data;
      document.getElementById('loading').style.display = 'none';
      render();
    });
  </script>
</body>
</html>
